name: Helm Package and Publish

on:
  push:
    branches:
      - feature/ghcr

jobs:
  package-helm-chart:
    permissions:
      contents: read
      packages: write

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package and push helm chart
        run: |
          mkdir -p packaged
          helm package chart -d packaged
          chart_name=$(find -name  '*.tgz' -print)
          helm push $chart_name oci://ghcr.io/dofevine/charts
