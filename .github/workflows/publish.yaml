name: Release Charts

on:
  push:
    branches:
      - main

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "Domingos Neto"
          git config user.email "dofevine@hotmail.com"
          
      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: "./"
          config: cr.yaml
          pages_branch: main
          repository: "dofevine/charts"
        env:
          CR_TOKEN: "${{ secrets.CHART_TOKEN }}"
          
